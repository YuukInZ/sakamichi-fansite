<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>坂道推 — Sakamichi Fansite</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <span class="brand-icon">◆</span>
            <span class="brand-text">坂道推</span>
        </div>
        <div class="nav-links">
            <a href="#home" class="nav-link active">首页</a>
            <a href="#oshi" class="nav-link">我推</a>
            <a href="#members" class="nav-link">成员</a>
            <a href="#stats" class="nav-link">推活</a>
        </div>
        <button class="menu-toggle" aria-label="菜单">
            <span></span><span></span><span></span>
        </button>
    </nav>

    <section id="home" class="hero">
        <div class="hero-bg-gradient"></div>
        <div class="hero-content">
            <div class="hero-badge">粉丝站</div>
            <h1 class="hero-title">
                <span class="title-line">坂道</span>
                <span class="title-line title-highlight">我推</span>
            </h1>
            <p class="hero-desc">
                乃木坂46 · 樱坂46 · 日向坂46<br>
                登记你的推，记录每一份应援
            </p>
            <div class="hero-actions">
                <a href="#oshi" class="btn btn-primary">
                    <span>登记我推</span>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
                </a>
                <a href="#members" class="btn btn-ghost">
                    查看成员
                </a>
            </div>
            <div class="hero-groups">
                <div class="group-pill" data-group="nogizaka">
                    <span class="pill-dot" style="background:#9b59b6"></span>
                    乃木坂46
                </div>
                <div class="group-pill" data-group="sakurazaka">
                    <span class="pill-dot" style="background:#ff69b4"></span>
                    樱坂46
                </div>
                <div class="group-pill" data-group="hinatazaka">
                    <span class="pill-dot" style="background:#87ceeb"></span>
                    日向坂46
                </div>
            </div>
        </div>
        <div class="hero-visual">
            <div class="visual-card card-nogi">
                <div class="card-shine"></div>
                <span class="card-text">乃木坂46</span>
            </div>
            <div class="visual-card card-saku">
                <div class="card-shine"></div>
                <span class="card-text">樱坂46</span>
            </div>
            <div class="visual-card card-hina">
                <div class="card-shine"></div>
                <span class="card-text">日向坂46</span>
            </div>
        </div>
    </section>

    <section id="oshi" class="section oshi-section">
        <div class="container">
            <div class="section-header">
                <span class="section-tag">我推登记</span>
                <h2 class="section-title">我的推</h2>
                <p class="section-desc">登记你推的成员，记录推活点滴</p>
            </div>
            <div class="oshi-form">
                <div class="form-card">
                    <div class="form-group">
                        <label>组合</label>
                        <div class="group-select">
                            <button class="group-btn active" data-group="nogizaka">
                                <span class="g-dot" style="background:#9b59b6"></span>
                                乃木坂46
                            </button>
                            <button class="group-btn" data-group="sakurazaka">
                                <span class="g-dot" style="background:#ff69b4"></span>
                                樱坂46
                            </button>
                            <button class="group-btn" data-group="hinatazaka">
                                <span class="g-dot" style="background:#87ceeb"></span>
                                日向坂46
                            </button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="member-name">成员名</label>
                        <input type="text" id="member-name" placeholder="例：齋藤飛鳥" autocomplete="off">
                        <div class="suggestions" id="suggestions"></div>
                    </div>
                    <div class="form-group">
                        <label>应援度</label>
                        <div class="cheer-meter">
                            <div class="meter-track">
                                <div class="meter-fill" id="cheer-fill"></div>
                            </div>
                            <div class="meter-btns">
                                <button class="meter-btn" data-val="1">♡</button>
                                <button class="meter-btn" data-val="2">♡♡</button>
                                <button class="meter-btn" data-val="3">♡♡♡</button>
                                <button class="meter-btn" data-val="4">♡♡♡♡</button>
                                <button class="meter-btn" data-val="5">♡♡♡♡♡</button>
                            </div>
                            <input type="hidden" id="cheer-level" value="3">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="oshi-memo">备注</label>
                        <textarea id="oshi-memo" rows="2" placeholder="入坑契机、喜欢的点等"></textarea>
                    </div>
                    <button class="btn btn-primary btn-full" id="add-oshi">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
                        登记
                    </button>
                </div>
            </div>
            <div class="oshi-list" id="oshi-list"></div>
            <div class="oshi-empty" id="oshi-empty">
                <div class="empty-icon">💫</div>
                <p>还没有登记任何推</p>
                <span>从上方添加你的推吧</span>
            </div>
        </div>
    </section>

    <section id="members" class="section members-section">
        <div class="container">
            <div class="section-header">
                <span class="section-tag">成员图鉴</span>
                <h2 class="section-title">坂道成员</h2>
                <p class="section-desc">查看各组成员</p>
            </div>
            <div class="filter-tabs">
                <button class="filter-tab active" data-filter="all">全部</button>
                <button class="filter-tab" data-filter="nogizaka">乃木坂46</button>
                <button class="filter-tab" data-filter="sakurazaka">樱坂46</button>
                <button class="filter-tab" data-filter="hinatazaka">日向坂46</button>
            </div>
            <div class="members-grid" id="members-grid"></div>
        </div>
    </section>

    <section id="stats" class="section stats-section">
        <div class="container">
            <div class="section-header">
                <span class="section-tag">推活记录</span>
                <h2 class="section-title">推活</h2>
                <p class="section-desc">今天也要好好推活</p>
            </div>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon">📝</div>
                    <div class="stat-number" id="stat-count">0</div>
                    <div class="stat-label">推登记数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">❤️</div>
                    <div class="stat-number" id="stat-cheer">0</div>
                    <div class="stat-label">总应援度</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">📅</div>
                    <div class="stat-number" id="stat-days">1</div>
                    <div class="stat-label">推活天数</div>
                </div>
            </div>
            <div class="activity-section">
                <div class="activity-card">
                    <h3>今日推活打卡</h3>
                    <div class="check-list" id="check-list">
                        <label class="check-item">
                            <input type="checkbox" data-check="morning">
                            <span class="check-box"></span>
                            <span class="check-text">发了推的早安帖 / 动态</span>
                        </label>
                        <label class="check-item">
                            <input type="checkbox" data-check="photo">
                            <span class="check-box"></span>
                            <span class="check-text">看了推的照片 / 视频</span>
                        </label>
                        <label class="check-item">
                            <input type="checkbox" data-check="goods">
                            <span class="check-box"></span>
                            <span class="check-text">在考虑买周边 / 写真集</span>
                        </label>
                        <label class="check-item">
                            <input type="checkbox" data-check="stream">
                            <span class="check-box"></span>
                            <span class="check-text">听了歌 / 看了MV / 直播</span>
                        </label>
                        <label class="check-item">
                            <input type="checkbox" data-check="share">
                            <span class="check-box"></span>
                            <span class="check-text">跟朋友安利了推</span>
                        </label>
                    </div>
                    <div class="activity-progress">
                        <div class="progress-track">
                            <div class="progress-fill" id="activity-fill"></div>
                        </div>
                        <span class="progress-text" id="activity-text">0/5</span>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <div class="footer-brand">
                <span class="brand-icon">◆</span>
                <span>坂道推</span>
            </div>
            <p class="footer-text">个人粉丝站 · 非官方 · 非营利</p>
            <div class="footer-groups">
                <span class="fg-nogi">乃木坂46</span>
                <span class="fg-saku">樱坂46</span>
                <span class="fg-hina">日向坂46</span>
            </div>
            <p class="footer-copy">© 2025 坂道推</p>
        </div>
    </footer>

    <div class="toast" id="toast"></div>

    <script src="js/main.js"></script>
</body>
</html>
