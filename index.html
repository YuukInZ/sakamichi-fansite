<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>坂道推しランキング — Sakamichi TOP10</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="bg-glow"></div>
    
    <nav class="navbar">
        <div class="nav-brand">◆ 坂道推し</div>

            <a href="#about" class="nav-link">About</a>

    <section id="home" class="hero">

            <div class="hero-badge">坂道シリーズ · 推しランキング</div>
            <h1 class="hero-title">

    <section class="ranking">

            <div class="rank-list" id="rank-list">

            </div>
        </div>

    <section id="about" class="about">
        <div class="container">
            <h2>About</h2>
            <p>個人ファンサイト。推しメンバーを記録しています。</p>
            <p class="about-groups">
                <span class="tag-nogi">乃木坂46</span>

                <span class="tag-hina">日向坂46</span>

    <footer class="footer">

    </footer>

    <script src="js/main.js"></script>
